[general]
live_config_reload = true
ipc_socket = true
import = ["~/.config/alacritty/themes/nord.toml"]

[env]
TERM = "xterm-256color"

[window]
dimensions = { columns = 120, lines = 34 }
padding = { x = 10, y = 10 }
dynamic_padding = true
decorations = "Full"
opacity = 0.82
blur = true
startup_mode = "Windowed"
dynamic_title = true

[scrolling]
history = 100000
multiplier = 3

[font]
normal = { family = "FiraCode Nerd Font Mono", style = "Regular" }
bold = { family = "FiraCode Nerd Font Mono", style = "Bold" }
italic = { family = "FiraCode Nerd Font Mono", style = "Italic" }
bold_italic = { family = "FiraCode Nerd Font Mono", style = "Bold Italic" }
size = 14.5
offset = { x = 0, y = 1 }
glyph_offset = { x = 0, y = 0 }
builtin_box_drawing = true

[selection]
save_to_clipboard = true

[cursor]
style = { shape = "Block", blinking = "Off" }
unfocused_hollow = true

[terminal]
shell = { program = "/bin/zsh", args = ["--login"] }

[mouse]
hide_when_typing = true

[keyboard]
bindings = [
  { key = "N", mods = "Command", action = "SpawnNewInstance" },
]

[colors]
draw_bold_text_with_bright_colors = true
